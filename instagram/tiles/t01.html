<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>01 — Brand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden;background:#F5F2ED}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Cormorant Garamond',Georgia,serif;color:#1A1A1A;position:relative}
.bg{position:absolute;inset:0;z-index:1;background-size:cover;background-position:center;opacity:0;transition:opacity 0.5s}
.photo-veil{position:absolute;inset:0;z-index:2;background:rgba(245,242,237,0.68);pointer-events:none;opacity:0;transition:opacity 0.5s}
.corner{position:absolute;width:28px;height:28px;border-color:#C8C4BE;border-style:solid;z-index:10}
.corner.tl{top:52px;left:52px;border-width:1px 0 0 1px}
.corner.tr{top:52px;right:52px;border-width:1px 1px 0 0}
.corner.bl{bottom:52px;left:52px;border-width:0 0 1px 1px}
.corner.br{bottom:52px;right:52px;border-width:0 1px 1px 0}
.inner{display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;z-index:10}
.eyebrow{font-family:'Jost',sans-serif;font-weight:200;font-size:18px;letter-spacing:0.42em;text-transform:uppercase;color:#9B9590;margin-bottom:56px;transition:color 0.5s,text-shadow 0.5s}
.rule{width:52px;height:1px;background:#C4A97A;margin-bottom:56px}
.name-first{font-weight:300;font-size:128px;letter-spacing:0.14em;line-height:0.95;color:#1A1A1A}
.name-last{font-style:italic;font-weight:300;font-size:128px;letter-spacing:0.07em;line-height:1.0;color:#1A1A1A}
.rule-bottom{width:52px;height:1px;background:#C4A97A;margin-top:56px;margin-bottom:48px}
.tagline{font-family:'Jost',sans-serif;font-weight:200;font-size:16px;letter-spacing:0.38em;text-transform:uppercase;color:#9B9590;display:flex;align-items:center;gap:18px;transition:color 0.5s,text-shadow 0.5s}
body.has-photo .eyebrow,body.has-photo .tagline{color:#1A1A1A;text-shadow:0 0 22px rgba(245,242,237,1),0 0 8px rgba(245,242,237,1)}
.sep{display:block;width:3px;height:3px;border-radius:50%;background:#C4A97A;flex-shrink:0}
.add-photo{position:absolute;bottom:44px;right:44px;z-index:20;width:26px;height:26px;border:1px solid rgba(26,26,26,0.18);background:transparent;cursor:pointer;border-radius:50%;font-family:'Jost',sans-serif;font-size:15px;color:rgba(26,26,26,0.22);line-height:24px;text-align:center;-webkit-tap-highlight-color:transparent;transition:all 0.2s}
.add-photo:active{border-color:rgba(196,169,122,0.8);color:#C4A97A}
body.has-photo .add-photo{border-color:rgba(245,242,237,0.4);color:rgba(245,242,237,0.4)}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div class="photo-veil" id="photo-veil"></div>
<span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
<div class="inner">
  <div class="eyebrow">Creative Direction</div>
  <div class="rule"></div>
  <div><span class="name-first" style="display:block">ERICA</span><span class="name-last" style="display:block">Georgis</span></div>
  <div class="rule-bottom"></div>
  <div class="tagline">Interior Design<span class="sep"></span>Sydney</div>
</div>
<div class="add-photo" id="add-photo" onclick="document.getElementById('fp').click()">+</div>
<input type="file" id="fp" accept="image/*" style="display:none">
<script>
var KEY='tile01';
function setImg(src){
  document.getElementById('bg').style.backgroundImage='url('+src+')';
  document.getElementById('bg').style.opacity='1';
  document.getElementById('photo-veil').style.opacity='1';
  document.body.classList.add('has-photo');
}
try{var s=localStorage.getItem('eg_'+KEY);if(s)setImg(s);}catch(e){}
document.getElementById('fp').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var src=ev.target.result;try{localStorage.setItem('eg_'+KEY,src);}catch(e){}setImg(src);};r.readAsDataURL(f);});
!function(){var s=Math.min(window.innerWidth,window.innerHeight)/1080;document.body.style.transform='scale('+s+')';document.body.style.transformOrigin='top left';document.documentElement.style.overflow='hidden';var v=Math.min(window.innerWidth,window.innerHeight);document.documentElement.style.width=v+'px';document.documentElement.style.height=v+'px';}();
</script>
</body>
</html>
