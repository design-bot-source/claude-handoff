<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T02 — Interior Panoramic · Left</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden}
body{position:relative;overflow:hidden}

/* IMAGE: Save as instagram/images/interior-wide.jpg — this tile shows the LEFT half */
.bg{
  position:absolute;inset:0;z-index:1;
  background-image:url('../images/interior-wide.jpg');
  background-size:200% auto;
  background-position:0% center;
  background-color:#EDE8E0;
  filter:brightness(0.88) contrast(1.08) saturate(0.88);
}

/* Colour grade overlay — sits on top of image */
.filter{
  position:absolute;inset:0;z-index:2;
  background:rgba(10,8,6,0.18);
  pointer-events:none;
}

/* Caption — bottom left */
.caption{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  padding:120px 72px 72px;
  background:linear-gradient(to top,rgba(6,5,4,0.65) 0%,transparent 100%);
}
.cap-label{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:14px;letter-spacing:0.38em;text-transform:uppercase;
  color:rgba(250,250,248,0.6);margin-bottom:14px;
}
.cap-title{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:54px;letter-spacing:0.04em;line-height:1.08;
  color:#FAFAF8;
}
.cap-title em{font-style:italic}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="filter"></div>
  <div class="caption">
    <div class="cap-label">Featured Project</div>
    <div class="cap-title">Point Piper<br><em>Residence</em></div>
  </div>
</body>
</html>
