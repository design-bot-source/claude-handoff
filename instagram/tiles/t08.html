<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T08 — Facade Panoramic · Right</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden}
body{position:relative;overflow:hidden}

/*
  IMAGE: facade.jpg (same file as T07)
  This tile shows the RIGHT half of that image.
*/
.bg{
  position:absolute;inset:0;
  background-image:url('../images/facade.jpg');
  background-size:200% auto;
  background-position:100% center;
  background-repeat:no-repeat;
  background-color:#DCDCDA;
}

.ph{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  background:linear-gradient(135deg,#D8D8D5,#C8C8C5);
}
.ph-frame{width:80px;height:80px;border:1px dashed rgba(26,26,26,0.25);display:flex;align-items:center;justify-content:center}
.ph-label{font-family:'Jost',sans-serif;font-weight:200;font-size:14px;letter-spacing:0.32em;text-transform:uppercase;color:rgba(26,26,26,0.35);text-align:center;line-height:1.8}

.stamp{
  position:absolute;top:60px;right:68px;
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:13px;letter-spacing:0.35em;text-transform:uppercase;
  color:rgba(250,250,248,0.5);
}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="ph">
    <div class="ph-frame">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="rgba(26,26,26,0.3)" stroke-width="1">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <div class="ph-label">images/facade.jpg<br>RIGHT half of exterior panoramic</div>
  </div>
  <div class="stamp">Sydney · 2025</div>
</body>
</html>
