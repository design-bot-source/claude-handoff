<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T11 — Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden}
body{
  background:#F5F2ED;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:96px 88px;
  font-family:'Cormorant Garamond',Georgia,serif;
  color:#1A1A1A;
  position:relative;
}

.top{display:flex;flex-direction:column}

.eyebrow{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:13px;
  letter-spacing:0.42em;
  text-transform:uppercase;
  color:#9B9590;
  margin-bottom:52px;
}
.h{
  font-weight:300;
  font-size:88px;
  letter-spacing:-0.01em;
  line-height:0.92;
  color:#1A1A1A;
}
.h em{
  display:block;
  font-style:italic;
  font-weight:300;
}

.bottom{display:flex;flex-direction:column;gap:0}

.rule-h{
  width:100%;
  height:1px;
  background:rgba(26,26,26,0.15);
  margin-bottom:52px;
}

.services-list{
  list-style:none;
  display:flex;
  flex-direction:column;
  gap:0;
}
.services-list li{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  padding:22px 0;
  border-bottom:1px solid rgba(26,26,26,0.1);
}
.services-list li:last-child{border-bottom:none}
.svc-name{
  font-weight:300;
  font-size:32px;
  letter-spacing:0.03em;
  color:#1A1A1A;
}
.svc-num{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:13px;
  letter-spacing:0.2em;
  color:#9B9590;
}
</style>
</head>
<body>
  <div class="top">
    <div class="eyebrow">What we do</div>
    <div class="h">Full<br><em>Service</em><br>Design</div>
  </div>
  <div class="bottom">
    <div class="rule-h"></div>
    <ul class="services-list">
      <li>
        <span class="svc-name">Concept &amp; Direction</span>
        <span class="svc-num">01</span>
      </li>
      <li>
        <span class="svc-name">Spatial Design</span>
        <span class="svc-num">02</span>
      </li>
      <li>
        <span class="svc-name">Procurement</span>
        <span class="svc-num">03</span>
      </li>
      <li>
        <span class="svc-name">Project Delivery</span>
        <span class="svc-num">04</span>
      </li>
    </ul>
  </div>
</body>
</html>
