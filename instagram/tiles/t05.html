<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T05 — Quote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden}
body{
  background:#1A1A1A;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Cormorant Garamond',Georgia,serif;
  color:#F5F2ED;
  position:relative;
  padding:100px;
}

.corner{position:absolute;width:24px;height:24px;border-color:rgba(245,242,237,0.12);border-style:solid}
.corner.tl{top:52px;left:52px;border-width:1px 0 0 1px}
.corner.tr{top:52px;right:52px;border-width:1px 1px 0 0}
.corner.bl{bottom:52px;left:52px;border-width:0 0 1px 1px}
.corner.br{bottom:52px;right:52px;border-width:0 1px 1px 0}

.inner{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  max-width:840px;
  gap:0;
}
.eyebrow{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:13px;
  letter-spacing:0.44em;
  text-transform:uppercase;
  color:rgba(196,169,122,0.6);
  margin-bottom:60px;
}
.quote{
  font-style:italic;
  font-weight:300;
  font-size:72px;
  line-height:1.25;
  letter-spacing:0.01em;
  color:#F5F2ED;
  margin-bottom:72px;
}
.rule{
  width:44px;
  height:1px;
  background:rgba(196,169,122,0.55);
  margin-bottom:44px;
}
.attribution{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:14px;
  letter-spacing:0.44em;
  text-transform:uppercase;
  color:rgba(245,242,237,0.4);
}
</style>
</head>
<body>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <div class="inner">
    <div class="eyebrow">Philosophy</div>
    <div class="quote">The finest spaces are felt before they are seen.</div>
    <div class="rule"></div>
    <div class="attribution">Erica Georgis</div>
  </div>
</body>
</html>
