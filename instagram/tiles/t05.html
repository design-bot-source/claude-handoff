<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>05 — Quote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden;background:#1A1A1A}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Cormorant Garamond',Georgia,serif;color:#F5F2ED;position:relative;padding:100px}
.bg{position:absolute;inset:0;z-index:1;background-size:cover;background-position:center;opacity:0;transition:opacity 0.5s}
.photo-veil{position:absolute;inset:0;z-index:2;background:rgba(10,8,6,0.65);pointer-events:none;opacity:0;transition:opacity 0.5s}
.corner{position:absolute;width:24px;height:24px;border-color:rgba(245,242,237,0.12);border-style:solid;z-index:10}
.corner.tl{top:52px;left:52px;border-width:1px 0 0 1px}
.corner.tr{top:52px;right:52px;border-width:1px 1px 0 0}
.corner.bl{bottom:52px;left:52px;border-width:0 0 1px 1px}
.corner.br{bottom:52px;right:52px;border-width:0 1px 1px 0}
.inner{display:flex;flex-direction:column;align-items:center;text-align:center;max-width:840px;position:relative;z-index:10}
.eyebrow{font-family:'Jost',sans-serif;font-weight:200;font-size:13px;letter-spacing:0.44em;text-transform:uppercase;color:rgba(196,169,122,0.6);margin-bottom:60px}
.quote{font-style:italic;font-weight:300;font-size:72px;line-height:1.25;letter-spacing:0.01em;color:#F5F2ED;margin-bottom:72px}
.rule{width:44px;height:1px;background:rgba(196,169,122,0.55);margin-bottom:44px}
.attribution{font-family:'Jost',sans-serif;font-weight:200;font-size:14px;letter-spacing:0.44em;text-transform:uppercase;color:rgba(245,242,237,0.4)}
.add-photo{position:absolute;bottom:44px;right:44px;z-index:20;width:26px;height:26px;border:1px solid rgba(245,242,237,0.15);background:transparent;cursor:pointer;border-radius:50%;font-family:'Jost',sans-serif;font-size:15px;color:rgba(245,242,237,0.2);line-height:24px;text-align:center;-webkit-tap-highlight-color:transparent;transition:all 0.2s}
.add-photo:active{border-color:rgba(196,169,122,0.8);color:#C4A97A}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div class="photo-veil" id="photo-veil"></div>
<span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
<div class="inner">
  <div class="eyebrow">Philosophy</div>
  <div class="quote">The finest spaces are felt before they are seen.</div>
  <div class="rule"></div>
  <div class="attribution">Erica Georgis</div>
</div>
<div class="add-photo" id="add-photo" onclick="document.getElementById('fp').click()">+</div>
<input type="file" id="fp" accept="image/*" style="display:none">
<script>
var KEY='tile05';
function setImg(src){
  document.getElementById('bg').style.backgroundImage='url('+src+')';
  document.getElementById('bg').style.opacity='1';
  document.getElementById('photo-veil').style.opacity='1';
  document.getElementById('add-photo').style.display='none';
}
try{var s=localStorage.getItem('eg_'+KEY);if(s)setImg(s);}catch(e){}
document.getElementById('fp').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var src=ev.target.result;try{localStorage.setItem('eg_'+KEY,src);}catch(e){}setImg(src);};r.readAsDataURL(f);});
!function(){var s=Math.min(window.innerWidth,window.innerHeight)/1080;document.body.style.transform='scale('+s+')';document.body.style.transformOrigin='top left';document.documentElement.style.overflow='hidden';var v=Math.min(window.innerWidth,window.innerHeight);document.documentElement.style.width=v+'px';document.documentElement.style.height=v+'px';}();
</script>
</body>
</html>
