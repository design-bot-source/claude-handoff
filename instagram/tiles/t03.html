<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T03 — Interior Panoramic · Right</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden}
body{position:relative;overflow:hidden}

/* IMAGE: same interior-wide.jpg — this tile shows the RIGHT half */
.bg{
  position:absolute;inset:0;z-index:1;
  background-image:url('../images/interior-wide.jpg');
  background-size:200% auto;
  background-position:100% center;
  background-color:#D8D0C4;
  filter:brightness(0.88) contrast(1.08) saturate(0.88);
}

.filter{
  position:absolute;inset:0;z-index:2;
  background:rgba(10,8,6,0.18);
  pointer-events:none;
}

.stamp{
  position:absolute;top:60px;right:68px;z-index:3;
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:14px;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(250,250,248,0.5);
}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="filter"></div>
  <div class="stamp">Sydney · 2025</div>
</body>
</html>
