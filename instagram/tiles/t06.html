<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T06 — Staircase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden}
body{position:relative;overflow:hidden}

/*
  IMAGE: staircase.jpg
  Save your aerial staircase shot as: instagram/images/staircase.jpg
  Crop to 1:1 — the composition is already near-square, centre it.
*/
.bg{
  position:absolute;inset:0;
  background-image:url('../images/staircase.jpg');
  background-size:cover;
  background-position:center center;
  background-color:#F0F0EE;
}

.ph{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  background:linear-gradient(180deg,#F2F2F0,#E5E4E0);
}
.ph-frame{width:80px;height:80px;border:1px dashed rgba(26,26,26,0.2);display:flex;align-items:center;justify-content:center}
.ph-label{font-family:'Jost',sans-serif;font-weight:200;font-size:14px;letter-spacing:0.32em;text-transform:uppercase;color:rgba(26,26,26,0.3);text-align:center;line-height:1.8}

/* Architectural label — bottom right */
.label{
  position:absolute;bottom:60px;right:68px;
  text-align:right;
}
.label-cat{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:12px;letter-spacing:0.38em;text-transform:uppercase;
  color:rgba(26,26,26,0.4);margin-bottom:8px;
}
.label-title{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:13px;letter-spacing:0.25em;text-transform:uppercase;
  color:rgba(26,26,26,0.5);
}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="ph">
    <div class="ph-frame">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="rgba(26,26,26,0.25)" stroke-width="1">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <div class="ph-label">images/staircase.jpg<br>Aerial crop · square format</div>
  </div>
  <div class="label">
    <div class="label-cat">Architectural Detail</div>
    <div class="label-title">Sculptural Stair</div>
  </div>
</body>
</html>
