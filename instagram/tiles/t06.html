<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T06 — Staircase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden}
body{position:relative;overflow:hidden}

/* IMAGE: Save as instagram/images/staircase.jpg */
.bg{
  position:absolute;inset:0;z-index:1;
  background-image:url('../images/staircase.jpg');
  background-size:cover;
  background-position:center center;
  background-color:#F0F0EE;
  filter:brightness(0.88) contrast(1.08) saturate(0.88);
}

.filter{
  position:absolute;inset:0;z-index:2;
  background:rgba(10,8,6,0.15);
  pointer-events:none;
}

.label{
  position:absolute;bottom:60px;right:68px;z-index:3;
  text-align:right;
}
.label-cat{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:12px;letter-spacing:0.38em;text-transform:uppercase;
  color:rgba(250,250,248,0.45);margin-bottom:8px;
}
.label-title{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:13px;letter-spacing:0.25em;text-transform:uppercase;
  color:rgba(250,250,248,0.6);
}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="filter"></div>
  <div class="label">
    <div class="label-cat">Architectural Detail</div>
    <div class="label-title">Sculptural Stair</div>
  </div>
</body>
</html>
