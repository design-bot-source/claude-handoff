<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>09 — Manifesto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden;background:#1A1A1A}
body{display:flex;flex-direction:column;justify-content:flex-end;padding:80px 88px 96px;font-family:'Cormorant Garamond',Georgia,serif;color:#F5F2ED;position:relative}
.v-rule{position:absolute;left:52px;top:52px;bottom:52px;width:1px;background:rgba(196,169,122,0.25)}
.top-mark{position:absolute;top:88px;right:88px;font-family:'Jost',sans-serif;font-weight:200;font-size:12px;letter-spacing:0.4em;text-transform:uppercase;color:rgba(245,242,237,0.3)}
.content{max-width:860px}
.intro{font-family:'Jost',sans-serif;font-weight:200;font-size:14px;letter-spacing:0.38em;text-transform:uppercase;color:rgba(245,242,237,0.4);margin-bottom:40px}
.h{font-weight:300;font-size:96px;line-height:0.95;letter-spacing:-0.01em;color:#F5F2ED;margin-bottom:4px}
.h.it{font-style:italic;letter-spacing:0.01em}
.h.last{margin-bottom:52px}
.rule{width:44px;height:1px;background:rgba(196,169,122,0.6);margin-bottom:40px}
.sub{font-style:italic;font-weight:300;font-size:33px;line-height:1.45;color:rgba(245,242,237,0.7);letter-spacing:0.01em}
</style>
</head>
<body>
<div class="v-rule"></div>
<div class="top-mark">Philosophy</div>
<div class="content">
  <div class="intro">I believe</div>
  <div class="h">I don't</div>
  <div class="h it">follow</div>
  <div class="h last">trends.</div>
  <div class="rule"></div>
  <div class="sub">I create spaces that feel<br>like they were always yours.</div>
</div>
<script>!function(){var s=Math.min(window.innerWidth,window.innerHeight)/1080;document.body.style.transform='scale('+s+')';document.body.style.transformOrigin='top left';document.documentElement.style.overflow='hidden';var v=Math.min(window.innerWidth,window.innerHeight);document.documentElement.style.width=v+'px';document.documentElement.style.height=v+'px';}();</script>
</body>
</html>
