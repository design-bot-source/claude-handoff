<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>10 — Marble</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden;position:relative}
.bg{position:absolute;inset:0;z-index:1;background:#7BAAA8 url('../images/marble.jpg') center/cover no-repeat;filter:brightness(0.9) contrast(1.06) saturate(0.92)}
.filter{position:absolute;inset:0;z-index:2;background:rgba(10,8,6,0.12);pointer-events:none}
.overlay{position:absolute;top:0;left:0;right:0;z-index:3;padding:72px 72px 130px;background:linear-gradient(to bottom,rgba(6,5,4,0.45) 0%,transparent 100%)}
.mat-type{font-family:'Jost',sans-serif;font-weight:200;font-size:12px;letter-spacing:0.45em;text-transform:uppercase;color:rgba(250,250,248,0.55);margin-bottom:12px}
.mat-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:44px;letter-spacing:0.04em;line-height:1.1;color:#FAFAF8}
.mat-code{position:absolute;bottom:64px;right:68px;z-index:3;font-family:'Jost',sans-serif;font-weight:200;font-size:12px;letter-spacing:0.35em;text-transform:uppercase;color:rgba(250,250,248,0.4);text-align:right}
.ph{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ph-btn{font-family:'Jost',sans-serif;font-weight:200;font-size:16px;letter-spacing:0.28em;text-transform:uppercase;color:rgba(255,255,255,0.9);background:rgba(0,0,0,0.55);padding:22px 40px;border-radius:2px;text-align:center}
.ph-btn small{display:block;font-size:11px;letter-spacing:0.2em;margin-top:8px;opacity:0.6}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div class="filter"></div>
<div class="ph" id="ph" onclick="document.getElementById('fp').click()">
  <div class="ph-btn">Tap to add photo<small>Marble / material close-up</small></div>
</div>
<input type="file" id="fp" accept="image/*" style="display:none">
<div class="overlay"><div class="mat-type">Material</div><div class="mat-name">Verde Onyx</div></div>
<div class="mat-code">Stone · Feature Surface</div>
<script>
var KEY='marble';
function setImg(src){document.getElementById('bg').style.backgroundImage='url('+src+')';document.getElementById('ph').style.display='none';}
try{var s=localStorage.getItem('eg_'+KEY);if(s)setImg(s);}catch(e){}
document.getElementById('fp').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var src=ev.target.result;try{localStorage.setItem('eg_'+KEY,src);}catch(e){}setImg(src);};r.readAsDataURL(f);});
window.addEventListener('message',function(e){if(e.data&&e.data.key===KEY&&e.data.src)setImg(e.data.src);});
!function(){var s=Math.min(window.innerWidth,window.innerHeight)/1080;document.body.style.transform='scale('+s+')';document.body.style.transformOrigin='top left';document.documentElement.style.overflow='hidden';var v=Math.min(window.innerWidth,window.innerHeight);document.documentElement.style.width=v+'px';document.documentElement.style.height=v+'px';}();
</script>
</body>
</html>
