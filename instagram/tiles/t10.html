<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>10 — Marble</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden;position:relative}
.bg{position:absolute;inset:0;z-index:1;background:#7BAAA8 url('../images/marble.jpg') center/cover no-repeat;filter:brightness(0.9) contrast(1.06) saturate(0.92)}
.filter{position:absolute;inset:0;z-index:2;background:rgba(10,8,6,0.22);pointer-events:none}
.overlay{position:absolute;top:0;left:0;right:0;z-index:3;padding:80px 72px 160px;background:linear-gradient(to bottom,rgba(6,5,4,0.72) 0%,rgba(6,5,4,0.18) 60%,transparent 100%)}
.mat-type{font-family:'Jost',sans-serif;font-weight:200;font-size:14px;letter-spacing:0.45em;text-transform:uppercase;color:rgba(250,250,248,0.7);margin-bottom:18px;text-shadow:0 1px 8px rgba(0,0,0,0.6)}
.mat-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:72px;letter-spacing:0.03em;line-height:1.05;color:#FAFAF8;text-shadow:0 2px 16px rgba(0,0,0,0.5)}
.mat-code{position:absolute;bottom:64px;right:68px;z-index:3;font-family:'Jost',sans-serif;font-weight:200;font-size:12px;letter-spacing:0.35em;text-transform:uppercase;color:rgba(250,250,248,0.5);text-align:right;text-shadow:0 1px 6px rgba(0,0,0,0.5)}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div class="filter"></div>
<div class="overlay"><div class="mat-type">Material</div><div class="mat-name">Verde Onyx</div></div>
<div class="mat-code">Stone · Feature Surface</div>
<script>
var KEY='marble';
function setImg(src){document.getElementById('bg').style.backgroundImage='url('+src+')';}
try{var s=localStorage.getItem('eg_'+KEY);if(s)setImg(s);}catch(e){}
window.addEventListener('message',function(e){if(e.data&&e.data.key===KEY&&e.data.src)setImg(e.data.src);});
!function(){var s=Math.min(window.innerWidth,window.innerHeight)/1080;document.body.style.transform='scale('+s+')';document.body.style.transformOrigin='top left';document.documentElement.style.overflow='hidden';var v=Math.min(window.innerWidth,window.innerHeight);document.documentElement.style.width=v+'px';document.documentElement.style.height=v+'px';}();
</script>
</body>
</html>
