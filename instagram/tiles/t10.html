<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T10 — Marble</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden}
body{position:relative;overflow:hidden}

/* IMAGE: Save as instagram/images/marble.jpg */
.bg{
  position:absolute;inset:0;z-index:1;
  background-image:url('../images/marble.jpg');
  background-size:cover;
  background-position:center center;
  background-color:#7BAAA8;
  filter:brightness(0.9) contrast(1.06) saturate(0.92);
}

.filter{
  position:absolute;inset:0;z-index:2;
  background:rgba(10,8,6,0.12);
  pointer-events:none;
}

/* Top overlay for text legibility */
.overlay{
  position:absolute;top:0;left:0;right:0;z-index:3;
  padding:72px 72px 130px;
  background:linear-gradient(to bottom,rgba(6,5,4,0.45) 0%,transparent 100%);
}
.mat-type{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:12px;letter-spacing:0.45em;text-transform:uppercase;
  color:rgba(250,250,248,0.55);margin-bottom:12px;
}
.mat-name{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:44px;letter-spacing:0.04em;line-height:1.1;color:#FAFAF8;
}

.mat-code{
  position:absolute;bottom:64px;right:68px;z-index:3;
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:12px;letter-spacing:0.35em;text-transform:uppercase;
  color:rgba(250,250,248,0.4);text-align:right;
}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="filter"></div>
  <div class="overlay">
    <div class="mat-type">Material</div>
    <div class="mat-name">Verde Onyx</div>
  </div>
  <div class="mat-code">Stone · Feature Surface</div>
</body>
</html>
