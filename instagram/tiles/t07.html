<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T07 — Facade Panoramic · Left</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden}
body{position:relative;overflow:hidden}

/*
  IMAGE: facade.jpg
  Save your exterior facade shot as: instagram/images/facade.jpg
  This tile shows the LEFT half of that image.
*/
.bg{
  position:absolute;inset:0;
  background-image:url('../images/facade.jpg');
  background-size:200% auto;
  background-position:0% center;
  background-repeat:no-repeat;
  background-color:#E8E8E6;
}

.ph{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  background:linear-gradient(135deg,#EBEBEA,#D8D8D5);
}
.ph-frame{width:80px;height:80px;border:1px dashed rgba(26,26,26,0.25);display:flex;align-items:center;justify-content:center}
.ph-label{font-family:'Jost',sans-serif;font-weight:200;font-size:14px;letter-spacing:0.32em;text-transform:uppercase;color:rgba(26,26,26,0.35);text-align:center;line-height:1.8}

/* Caption overlay */
.caption{
  position:absolute;bottom:0;left:0;right:0;
  padding:110px 72px 72px;
  background:linear-gradient(to top,rgba(10,10,10,0.52) 0%,transparent 100%);
}
.cap-label{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:13px;letter-spacing:0.4em;text-transform:uppercase;
  color:rgba(250,250,248,0.55);margin-bottom:14px;
}
.cap-title{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:56px;letter-spacing:0.04em;line-height:1.08;
  color:#FAFAF8;
}
.cap-title em{font-style:italic}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="ph">
    <div class="ph-frame">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="rgba(26,26,26,0.3)" stroke-width="1">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <div class="ph-label">images/facade.jpg<br>LEFT half of exterior panoramic</div>
  </div>
  <div class="caption">
    <div class="cap-label">Exterior</div>
    <div class="cap-title">Bellevue Hill<br><em>Estate</em></div>
  </div>
</body>
</html>
